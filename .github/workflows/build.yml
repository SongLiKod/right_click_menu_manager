name: Build Windows Release

on:
  push:
    branches: [main]
    tags: ['v*', '[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos

      - name: Build Windows release
        run: |
          flutter create --platforms=windows .
          flutter build windows --release

      - name: Package build artifact
        shell: pwsh
        run: |
          $releasePath = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releasePath)) {
            $releasePath = "build\windows\runner\Release"
          }
          Write-Output "Packaging from: $releasePath"
          Compress-Archive -Path "$releasePath\*" -DestinationPath right_click_menu_manager_windows.zip

          $file = Get-Item right_click_menu_manager_windows.zip
          Write-Output "Package size: $([math]::Round($file.Length / 1MB, 2)) MB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: right_click_menu_manager_windows
          path: right_click_menu_manager_windows.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: right_click_menu_manager_windows

      - name: Upload to Release via gh CLI
        run: |
          gh release upload "${{ github.ref_name }}" right_click_menu_manager_windows.zip --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
